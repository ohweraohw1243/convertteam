name: Авто-обновление отчета

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-report:
    runs-on: ubuntu-latest

    steps:
    - name: Клонирование кода
      uses: actions/checkout@v3

    - name: Настройка Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Установка библиотек
      run: pip install requests gspread openpyxl

    - name: Создание credentials.json из секрета
      # Берем содержимое JSON из секретов GitHub и сохраняем локально, чтобы скрипт мог его прочитать
      run: echo '${{ secrets.GOOGLE_CREDENTIALS }}' > credentials.json

    - name: Запуск скрипта генерации
      env:
        DIRECT_TOKEN: ${{ secrets.DIRECT_TOKEN }}
        METRIKA_TOKEN: ${{ secrets.METRIKA_TOKEN }}
        METRIKA_COUNTER_ID: ${{ secrets.METRIKA_COUNTER_ID }}
        GOOGLE_SHEET_URL: ${{ secrets.GOOGLE_SHEET_URL }}
      run: python generate_report.py
